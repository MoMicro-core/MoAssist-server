<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MoMicro Assist Widget Tester</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      main {
        max-width: 900px;
        margin: 0 auto;
        padding: 48px 20px 64px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 32px;
      }
      p {
        margin: 0 0 20px;
        color: #cbd5f5;
      }
      .card {
        background: rgba(15, 23, 42, 0.65);
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.35);
      }
      label {
        display: block;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #94a3b8;
        margin-bottom: 6px;
      }
      input,
      textarea {
        width: 100%;
        border: 1px solid rgba(148, 163, 184, 0.4);
        border-radius: 10px;
        background: #0b1220;
        color: #e2e8f0;
        padding: 10px 12px;
        font-size: 14px;
      }
      textarea {
        min-height: 110px;
        resize: vertical;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
          "Courier New", monospace;
      }
      button {
        border: 0;
        border-radius: 12px;
        padding: 12px 16px;
        font-weight: 600;
        cursor: pointer;
      }
      .primary {
        background: #14b8a6;
        color: #041f1c;
      }
      .secondary {
        background: #1e293b;
        color: #e2e8f0;
        border: 1px solid rgba(148, 163, 184, 0.4);
      }
      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 16px;
      }
      .status {
        margin-top: 16px;
        font-size: 14px;
        color: #a5b4fc;
      }
      .iframe-wrap {
        margin-top: 24px;
        border-radius: 18px;
        overflow: hidden;
        border: 1px solid rgba(148, 163, 184, 0.35);
        display: none;
      }
      iframe {
        width: 100%;
        height: 720px;
        border: 0;
        background: #fff;
      }
      .hint {
        margin-top: 16px;
        font-size: 13px;
        color: #94a3b8;
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
          "Courier New", monospace;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>MoMicro Assist Widget Tester</h1>
      <p>Paste a widget script tag or iframe tag, then load it.</p>

      <div class="card">
        <div>
          <label for="snippet">Widget Script Or Iframe</label>
          <textarea
            id="snippet"
            placeholder="<script src=&quot;http://localhost:8080/chat/script/CHATBOT_ID&quot; defer></script>\n\n<iframe src=&quot;http://localhost:8080/chat/iframe/CHATBOT_ID&quot;></iframe>\n\nOr paste the direct URL."
          ></textarea>
        </div>

        <div class="actions">
          <button id="loadSnippet" class="primary" type="button">Load Widget</button>
          <button id="clearLoaded" class="secondary" type="button">Clear Loaded</button>
        </div>

        <div id="status" class="status">Status: waiting for input.</div>
        <div class="hint">
          The chatbot must be <strong>published</strong> and allow this origin.
        </div>
      </div>

      <div id="iframeWrap" class="iframe-wrap">
        <iframe id="iframe" title="Widget preview"></iframe>
      </div>
    </main>

    <script>
      const snippetInput = document.getElementById('snippet');
      const status = document.getElementById('status');
      const iframeWrap = document.getElementById('iframeWrap');
      const iframe = document.getElementById('iframe');
      const loadedScripts = new Map();

      const params = new URLSearchParams(window.location.search);
      const snippetParam = params.get('snippet');
      if (snippetParam) snippetInput.value = snippetParam;

      const setStatus = (message) => {
        status.textContent = `Status: ${message}`;
      };

      const parseSnippet = (value) => {
        const trimmed = value.trim();
        if (!trimmed) return { scriptSrc: '', iframeSrc: '' };
        const parser = new DOMParser();
        const doc = parser.parseFromString(trimmed, 'text/html');
        const scriptTag = doc.querySelector('script[src]');
        const iframeTag = doc.querySelector('iframe[src]');
        let scriptSrc = scriptTag?.getAttribute('src') || '';
        let iframeSrc = iframeTag?.getAttribute('src') || '';

        if (!scriptSrc && !iframeSrc && /^https?:\\/\\//i.test(trimmed)) {
          if (trimmed.includes('/chat/script/')) scriptSrc = trimmed;
          if (trimmed.includes('/chat/iframe/')) iframeSrc = trimmed;
          if (!scriptSrc && !iframeSrc && trimmed.endsWith('.js')) scriptSrc = trimmed;
        }

        return { scriptSrc, iframeSrc };
      };

      const loadScript = (src) => {
        if (loadedScripts.has(src)) {
          setStatus('Widget script already loaded.');
          return;
        }
        const script = document.createElement('script');
        script.src = src;
        script.async = true;
        script.defer = true;
        script.dataset.widgetTest = 'true';
        script.onload = () => setStatus('Widget script loaded.');
        script.onerror = () => {
          loadedScripts.delete(src);
          setStatus('Failed to load script. Check chatbot status or origin rules.');
        };
        document.body.appendChild(script);
        loadedScripts.set(src, script);
        setStatus('Loading widget script...');
      };

      const loadIframe = (src) => {
        iframe.src = src;
        iframeWrap.style.display = 'block';
      };

      document.getElementById('loadSnippet').addEventListener('click', () => {
        const { scriptSrc, iframeSrc } = parseSnippet(snippetInput.value);
        if (!scriptSrc && !iframeSrc) {
          setStatus('Paste a widget script, iframe tag, or URL.');
          return;
        }

        const statusParts = [];
        if (scriptSrc) {
          loadScript(scriptSrc);
          statusParts.push('script loading');
        }
        if (iframeSrc) {
          loadIframe(iframeSrc);
          statusParts.push('iframe loaded');
        }
        if (statusParts.length) setStatus(statusParts.join(', ') + '.');
      });

      document.getElementById('clearLoaded').addEventListener('click', () => {
        for (const script of loadedScripts.values()) {
          script.remove();
        }
        loadedScripts.clear();
        iframe.src = 'about:blank';
        iframeWrap.style.display = 'none';
        setStatus('Cleared loaded widget assets.');
      });
    </script>
  </body>
</html>
